<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 25px 35px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        width: 320px;
    }

    h1 {
        text-align: center;
        font-style: oblique;
    }

    label {
        display: block;
        margin-top: 12px;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        box-sizing: border-box;
    }

    .opcao {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 5px;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #007BFF;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 15px;
    }

    button:hover {
        background: #0056b3;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Cadastro do Cliente</h1>

    <form>
        <label>Nome</label>
        <input type="text">

        <label>Senha</label>
        <input type="password">

        <label>Data de Nascimento</label>
        <input type="date">

        <label>Estado da Empresa</label>
        <select>
            <option>SC</option>
            <option>SP</option>
            <option>RJ</option>
        </select>

        <label>Área de atuação</label>
        <div class="opcao">
            <input type="checkbox"> <span>Gerente</span>
        </div>
        <div class="opcao">
            <input type="checkbox"> <span>Funcionário</span>
        </div>

        <button type="submit">Cadastrar</button>
    </form>
</div>

</body>
</html>
